<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>

<body>
    <h1>Contact Me</h1>

    <!-- Registration Form with Table -->
    <form method="post">

        <fieldset>

            <table>

                <tr>
                    <td><label for="name">First Name:</label></td>
                    <td><input type="text" required></td>
                </tr>

                 <tr>
                    <td><label for="name">Last Name:</label></td>
                    <td><input type="text"  required></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="male"> Male
                        <input type="radio" name="gender" value="female"> Female
                    </td>
                </tr>

                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" required></td>
                </tr>
                <tr>
                    <td><label for="company">Company:</label></td>
                    <td><input type="text"></td>
                </tr>
                

                <tr>
                    <td><label>Reason of Contact:</label></td>
                    <td>
                        <input type="checkbox" value="project"> Projects
                        <input type="checkbox" value="thesis"> Thesis
                        <input type="checkbox" value="job"> Job
                    </td>
                </tr>
                
                <tr>
                    <td><label>Topics:</label></td>
                    <td>
                        <input type="checkbox" value="web development"> Web Development
                        <input type="checkbox" value="Mobile Development"> Mobile Development
                        <input type="checkbox" value="AI/ML Development"> AI/ML Development
                    </td>
                </tr>

                  <tr>
                    <td><label for="Consultation Date:">Consultation Date:</label></td>
                    <td><input type="date"></td>
                </tr>



                <tr>
                    <td></td>
                    <td>
                        <input type="submit">
                        <input type="reset">
                    </td>
                </tr>

            </table>

        </fieldset>

    </form>

    

    <a href="../index.html">Back to Home</a>
</body>

</html>
